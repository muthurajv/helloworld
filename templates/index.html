<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure OpenAI Chat</title>
</head>
<body>
    <h1>Hello World - Azure OpenAI Chat</h1>
    <form method="post">
        <input type="text" name="prompt" placeholder="Enter your prompt here" required>
        <button type="submit">Send</button>
    </form>
    {% if answer %}
        <h2>Response:</h2>
        <p>{{ answer }}</p>
    {% endif %}
</body>
</html>
